# ── Mosquitto MQTT Broker Configuration ───────────────────────────────────

# Default MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (optional — for browser-based MQTT clients)
listener 9001
protocol websockets

# Authentication — require username/password
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence — save messages across restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
log_timestamp true

# Connection limits
max_connections 200
max_keepalive 300