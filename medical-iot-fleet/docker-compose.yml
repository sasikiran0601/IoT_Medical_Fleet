services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: medical_iot_mqtt
    env_file:
      - backend/.env.docker
    command: >
      sh -ec "
      if [ ! -f /mosquitto/data/passwd ]; then
        mosquitto_passwd -b -c /mosquitto/data/passwd \"$$MQTT_USERNAME\" \"$$MQTT_PASSWORD\";
      else
        mosquitto_passwd -b /mosquitto/data/passwd \"$$MQTT_USERNAME\" \"$$MQTT_PASSWORD\";
      fi;
      exec mosquitto -c /mosquitto/config/mosquitto.conf
      "
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medical_iot_backend
    depends_on:
      mosquitto:
        condition: service_started
    env_file:
      - backend/.env.docker
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
